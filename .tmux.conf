# =============================================================================
# .tmux.conf — cross-platform (macOS + Linux)
# =============================================================================

# ── Prefix ───────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix          # C-a C-a sends literal C-a to the app

# ── Core ─────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"   # true color (Ghostty/iTerm2)
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -sg escape-time 0          # no Escape lag (critical for nvim)
set -g focus-events on         # lets nvim react to focus gain/loss
set -g mouse on

# ── Numbering ─────────────────────────────────────────────────────────────────
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on     # fill gaps when windows close

# ── Vi copy mode ─────────────────────────────────────────────────────────────
set -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Clipboard — pbcopy on macOS, xclip on Linux
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -sel clip'"

# ── Window navigation ─────────────────────────────────────────────────────────
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-h previous-window
bind -n M-l next-window
bind -n M-H swap-window -t -1\; select-window -t -1   # move window left
bind -n M-L swap-window -t +1\; select-window -t +1   # move window right

# ── Pane splitting ───────────────────────────────────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window   -c "#{pane_current_path}"   # inherit CWD on new window

# ── Pane navigation (vim-aware: passes C-h/j/k/l through to nvim) ────────────
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Resize panes (repeatable with -r)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Session management ────────────────────────────────────────────────────────
bind S choose-session
bind R command-prompt -I "#S" "rename-session '%%'"

# ── SSH to hostname in tmux buffer (Ctrl+s) ──────────────────────────────────
# Mac: reads macOS clipboard via pbpaste
# Linux: reads tmux's own buffer (copy with y in copy mode, no X11 needed)
if-shell "uname | grep -q Darwin" \
  "bind -n C-s run-shell 'tmux new-window \"ssh \\$(pbpaste)\"'" \
  "bind -n C-s run-shell 'tmux send-keys \"SSHPASS=\\$(pass show ssh-passwd) sshpass -e ssh \\$(tmux show-buffer)\" Enter'"

# ── Logging ───────────────────────────────────────────────────────────────────
# Prefix+P — toggle per-window log in ~/tmux-logs/
bind P if-shell '[ "$(tmux show-option -wv @logging 2>/dev/null)" = "on" ]' \
  'pipe-pane; set-window-option @logging off; display "Logging OFF"' \
  'pipe-pane -o "cat >> ~/tmux-logs/#{session_name}-w#{window_index}-#{window_name}.log"; \
   set-window-option @logging on; \
   display "Logging: ~/tmux-logs/#{session_name}-w#{window_index}-#{window_name}.log"'

# Auto-start logging for every new window
set-hook -g after-new-window \
  'run "mkdir -p ~/tmux-logs && tmux pipe-pane -o -t #{window_id} \
    \"cat >> ~/tmux-logs/#{session_name}-w#{window_index}.log\" 2>/dev/null; true"'

# ── Utility ───────────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"
bind ? list-keys                  # show all keybindings

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-style              'bg=#1e1e2e fg=#cdd6f4'
set -g status-left-length        30
set -g status-right-length       30
set -g status-left               ' #[bold]#S#[nobold] '
set -g status-right              ' %H:%M %d-%b-%Y '
set -g window-status-format      ' #I:#W '
set -g window-status-current-format ' #[bold]#I:#W#[nobold] '
set -g window-status-current-style  'bg=#89b4fa fg=#1e1e2e bold'
set -g pane-border-style            'fg=#45475a'
set -g pane-active-border-style     'fg=#89b4fa'
set -g message-style                'bg=#89b4fa fg=#1e1e2e'

# ── TPM (optional plugin manager) ────────────────────────────────────────────
# Install: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then: Prefix+I to install, Prefix+U to update, Prefix+Alt+u to remove
#
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # Prefix+Ctrl+s save, Prefix+Ctrl+r restore
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save every 15 min
set -g @continuum-restore 'on'
run '~/.tmux/plugins/tpm/tpm'
